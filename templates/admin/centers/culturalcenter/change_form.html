{% extends "admin/change_form.html" %}

{% block content %}
{{ block.super }}

<script>
var CASCADE_DATA = {
    districts: {{ districts_json|safe }},
    mahallas: {{ mahallas_json|safe }}
};

window.addEventListener('load', function() {
    setTimeout(function() {
        var $ = django.jQuery;
        var $r = $('#id_region');
        var $d = $('#id_district');
        var $m = $('#id_mahalla');
        var $sm = $('#id_serving_mahallas');
        if (!$r.length || !$d.length) return;

        var savedD = $d.val();
        var savedM = $m.length ? $m.val() : '';
        var savedSM = [];
        if ($sm.length) {
            $sm.find('option:selected').each(function() { savedSM.push($(this).val()); });
        }

        // Select2 ni olib tashlash
        [$r, $d, $m, $sm].forEach(function($el) {
            if ($el.length && $el.data('select2')) {
                $el.select2('destroy');
            }
        });

        function fill($sel, items, saved, ph) {
            $sel.empty().append('<option value="">' + ph + '</option>');
            (items || []).forEach(function(item) {
                var sel = String(item.id) === String(saved) ? ' selected' : '';
                $sel.append('<option value="' + item.id + '"' + sel + '>' + item.name + '</option>');
            });
        }

        function fillMulti($sel, items, savedArr) {
            $sel.empty();
            (items || []).forEach(function(item) {
                var sel = savedArr.indexOf(String(item.id)) >= 0 ? ' selected' : '';
                $sel.append('<option value="' + item.id + '"' + sel + '>' + item.name + '</option>');
            });
        }

        $r[0].onchange = function() {
            savedD = ''; savedM = ''; savedSM = [];
            fill($d, CASCADE_DATA.districts[this.value] || [], '', '-- Tumanni tanlang --');
            if ($m.length) fill($m, [], '', '-- Avval tuman tanlang --');
            if ($sm.length) fillMulti($sm, [], []);
        };

        $d[0].onchange = function() {
            savedM = ''; savedSM = [];
            var items = CASCADE_DATA.mahallas[this.value] || [];
            if ($m.length) fill($m, items, '', '-- Mahallani tanlang --');
            if ($sm.length) fillMulti($sm, items, []);
        };

        if ($r.val()) {
            fill($d, CASCADE_DATA.districts[$r.val()] || [], savedD, '-- Tumanni tanlang --');
            if ($d.val()) {
                var items = CASCADE_DATA.mahallas[$d.val()] || [];
                if ($m.length) fill($m, items, savedM, '-- Mahallani tanlang --');
                if ($sm.length) fillMulti($sm, items, savedSM);
            }
        }

        // === O'z binosiga ega checkbox ===
        var $cb = $('#id_has_own_building');
        if ($cb.length) {
            var buildingFields = [
                '#id_total_land_area', '#id_building_area', '#id_buildings_count',
                '#id_built_year', '#id_building_floors', '#id_condition',
                '#id_building_technical_info', '#id_building_technical_info_ru',
                '#id_rooms_count',
                '#id_auditorium_seats', '#id_dining_area',
                '#id_restrooms_count', '#id_additional_buildings_count',
                '#id_has_heating', '#id_has_electricity', '#id_has_gas',
                '#id_has_water', '#id_has_sewerage'
            ];

            function toggleBuilding() {
                var hide = !$cb.is(':checked');
                buildingFields.forEach(function(sel) {
                    var $el = $(sel);
                    $el.closest('.form-group, .form-row, tr').css({
                        opacity: hide ? '0.3' : '1',
                        pointerEvents: hide ? 'none' : ''
                    });
                });
                // Asosiy rasm
                var $img = $('#id_image');
                $img.closest('.form-group, .form-row').css({
                    opacity: hide ? '0.3' : '1',
                    pointerEvents: hide ? 'none' : ''
                });
                // Rasmlar inline
                $('.inline-group').each(function() {
                    $(this).css({
                        opacity: hide ? '0.3' : '1',
                        pointerEvents: hide ? 'none' : ''
                    });
                });
            }

            $cb.on('change', toggleBuilding);
            toggleBuilding();

            // Saqlash oldidan barcha maydonlarni enabled qilish
            $('form').on('submit', function() {
                buildingFields.forEach(function(sel) {
                    $(sel).prop('disabled', false);
                });
                $('#id_image').prop('disabled', false);
                $('.inline-group').find('input, select, textarea').prop('disabled', false);
            });
        }

        // === Avtomatik tarjima (UZ → RU) ===
        var TRANSLATE_PAIRS = [
            {source: '#id_name', target: '#id_name_ru'},
            {source: '#id_balance_holder', target: '#id_balance_holder_ru'},
            {source: '#id_building_technical_info', target: '#id_building_technical_info_ru'}
        ];

        var translateTimers = {};

        function autoTranslate(sourceId, $target, text) {
            if (!text.trim()) {
                return;
            }
            $.ajax({
                url: '/api/ajax/translate/',
                method: 'POST',
                contentType: 'application/json',
                headers: {'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value},
                data: JSON.stringify({text: text}),
                success: function(data) {
                    if (data.translated) {
                        $target.val(data.translated);
                        $target.css('background-color', '#e8f5e9');
                        setTimeout(function() { $target.css('background-color', ''); }, 1500);
                    }
                }
            });
        }

        TRANSLATE_PAIRS.forEach(function(pair) {
            var $source = $(pair.source);
            var $target = $(pair.target);
            if (!$source.length || !$target.length) return;

            $source.on('input change', function() {
                var text = $source.val();
                clearTimeout(translateTimers[pair.source]);
                translateTimers[pair.source] = setTimeout(function() {
                    autoTranslate(pair.source, $target, text);
                }, 800);
            });
        });

        // === Dublikat tekshirish ===
        var $name = $('#id_name');
        var districtCenters = [];  // tuman markazlari ro'yxati
        var currentCenterId = '{{ original.pk|default:"" }}';
        var $dupWarn = $('<div id="dup-warning" style="display:none; background:#fff3cd; border:1px solid #ffc107; color:#856404; padding:10px 15px; margin:5px 0; border-radius:4px; font-weight:bold; font-size:14px;"></div>');
        $name.closest('.form-row, .form-group, td').after($dupWarn);

        function extractNumber(text) {
            var m = text.match(/(\d+)/);
            return m ? m[1] : null;
        }

        function checkDuplicate() {
            var name = $name.val();
            var num = extractNumber(name || '');
            if (!num || !districtCenters.length) {
                $dupWarn.hide();
                return;
            }
            for (var i = 0; i < districtCenters.length; i++) {
                var c = districtCenters[i];
                if (currentCenterId && String(c.id) === currentCenterId) continue;
                var cNum = extractNumber(c.name);
                if (cNum === num) {
                    $dupWarn.html('⚠️ Diqqat! Bu tumanda <b>"' + c.name + '"</b> nomli markaz allaqachon kiritilgan! (ID: ' + c.id + ')').show();
                    return;
                }
            }
            $dupWarn.hide();
        }

        function loadDistrictCenters(districtId) {
            districtCenters = [];
            $dupWarn.hide();
            if (!districtId) return;
            $.getJSON('/api/ajax/centers-by-district/' + districtId + '/', function(data) {
                districtCenters = data;
                checkDuplicate();
            });
        }

        // Tuman o'zgarganda markazlarni yuklash
        var origDistrictChange = $d[0].onchange;
        $d[0].onchange = function() {
            if (origDistrictChange) origDistrictChange.call(this);
            loadDistrictCenters(this.value);
        };

        // Nom yozilganda tekshirish
        $name.on('input', function() {
            checkDuplicate();
        });

        // Sahifa yuklanganda tuman tanlangan bo'lsa
        if ($d.val()) {
            loadDistrictCenters($d.val());
        }

        console.log('[CASCADE] Tayyor!');
    }, 1000);
});
</script>
{% endblock %}
