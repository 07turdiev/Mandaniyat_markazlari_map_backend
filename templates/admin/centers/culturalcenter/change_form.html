{% extends "admin/change_form.html" %}

{% block content %}
{{ block.super }}

<script>
var CASCADE_DATA = {
    districts: {{ districts_json|safe }},
    mahallas: {{ mahallas_json|safe }}
};

window.addEventListener('load', function() {
    // 1 soniya kutish — select2, jazzmin, hamma narsa tayyor bo'lishini kafolatlaydi
    setTimeout(function() {
        var $ = django.jQuery;
        var $r = $('#id_region');
        var $d = $('#id_district');
        var $m = $('#id_mahalla');
        if (!$r.length || !$d.length) return;

        var savedD = $d.val();
        var savedM = $m.length ? $m.val() : '';

        // Select2 ni olib tashlash — oddiy selectga aylantirish
        [$r, $d, $m].forEach(function($el) {
            if ($el.length && $el.data('select2')) {
                $el.select2('destroy');
            }
        });

        function fill($sel, items, saved, ph) {
            $sel.empty().append('<option value="">' + ph + '</option>');
            (items || []).forEach(function(item) {
                var sel = String(item.id) === String(saved) ? ' selected' : '';
                $sel.append('<option value="' + item.id + '"' + sel + '>' + item.name + '</option>');
            });
        }

        // Viloyat o'zgarganda
        $r[0].onchange = function() {
            savedD = ''; savedM = '';
            fill($d, CASCADE_DATA.districts[this.value] || [], '', '-- Tumanni tanlang --');
            if ($m.length) fill($m, [], '', '-- Avval tuman tanlang --');
        };

        // Tuman o'zgarganda
        $d[0].onchange = function() {
            savedM = '';
            if ($m.length) fill($m, CASCADE_DATA.mahallas[this.value] || [], '', '-- Mahallani tanlang --');
        };

        // Tahrirlash rejimida - mavjud qiymatlarni yuklash
        if ($r.val()) {
            fill($d, CASCADE_DATA.districts[$r.val()] || [], savedD, '-- Tumanni tanlang --');
            if ($d.val() && $m.length) {
                fill($m, CASCADE_DATA.mahallas[$d.val()] || [], savedM, '-- Mahallani tanlang --');
            }
        }

        console.log('[CASCADE] Tayyor! Viloyatlar: ' + Object.keys(CASCADE_DATA.districts).length);
    }, 1000);
});
</script>
{% endblock %}
