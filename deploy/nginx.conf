# APP SERVER (192.168.200.3 - talimplatforma) uchun
# /etc/nginx/sites-available/markaz.madaniyhayot.uz

server {
    listen 80;
    server_name markaz.madaniyhayot.uz;

    client_max_body_size 20M;

    # Static files
    location /static/ {
        alias /home/user/markaz-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Media files (rasmlar)
    location /media/ {
        alias /home/user/markaz-backend/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Backend (API + Admin)
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
