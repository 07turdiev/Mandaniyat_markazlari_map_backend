# APP SERVER (192.168.200.3) uchun
# /etc/nginx/sites-available/markaz.madaniyhayot.uz

server {
    listen 80;
    server_name markaz.madaniyhayot.uz;

    client_max_body_size 200M;

    # Frontend (Vue SPA build)
    root /home/user/markazlar_map/front/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API (Docker - port 8002)
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin panel
    location /admin/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static (admin CSS/JS) - host papkadan
    location /static/ {
        alias /home/user/markazlar_map/back/staticfiles/;
        expires 30d;
    }

    # Media (rasmlar)
    location /media/ {
        alias /home/user/markazlar_map/back/media/;
        expires 30d;
    }
}
