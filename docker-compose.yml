services:
  web:
    build: .
    container_name: markaz-backend
    restart: always
    ports:
      - "8002:8002"
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - ./media:/app/media
      - static_files:/app/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings_prod

  nginx:
    image: nginx:alpine
    container_name: markaz-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - web

volumes:
  static_files:
